spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/traveldb?options=-c%20timezone=UTC
spring.datasource.username=${DB_USER:travel_user}
spring.datasource.password=${DB_PASS:travel_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080
