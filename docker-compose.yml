services:
  db:
    image: postgres:15
    container_name: travel_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - travel_network

  backend:
    build: ./backend
    container_name: travel_backend
    env_file:
      - .env
    ports:
      - "8081:8080"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - travel_network

  frontend:
    build: ./frontend
    container_name: travel_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - travel_network

networks:
  travel_network:
    driver: bridge

volumes:
  pgdata:
